    <script>
        function initializeUnityAds() {
            UnityAds.initialize('5643597', 'Interstitial_Android', false, function() {
                console.log("Unity Ads initialized");
                showUnityAd(); // Show ad immediately after initialization
            }, function(error) {
                console.log("Error initializing Unity Ads:", error);
            });
        }

        function showUnityAd() {
            if (UnityAds.isReady('Interstitial_Android')) {
                UnityAds.show('Interstitial_Android', function() {
                    console.log("Ad shown successfully");
                }, function(error) {
                    console.log("Error showing ad:", error);
                });
            } else {
                console.log("Ad not ready");
            }
        }
    </script>
